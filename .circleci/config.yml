---
version: 2.1

parameters:
  python-version:
    type: string
    default: "3.9"
  python-module:
    type: string
    default: "csv_detective"
  publish-branch:
    type: string
    default: "master"
  cache-prefix:
    type: string
    default: "py-cache"

jobs:
  install:
    docker:
      - image: ghcr.io/astral-sh/uv:python<< pipeline.parameters.python-version >>-bookworm-slim
    steps:
      - checkout
      - run:
          name: Get the base reference branch
          command: export BASE_BRANCH=$(base_branch)
      - restore_cache:
          keys:
            - << pipeline.parameters.cache-prefix >>-{{ arch }}-{{ checksum "pyproject.toml" }}
      - run:
          name: Install python dependencies
          command: uv sync --extra dev
      - save_cache:
          key: << pipeline.parameters.cache-prefix >>-{{ arch }}-{{ checksum "pyproject.toml" }}
          paths:
            - .venv
      - persist_to_workspace:
          root: .
          paths:
            - .

  lint:
    docker:
      - image: ghcr.io/astral-sh/uv:python<< pipeline.parameters.python-version >>-bookworm-slim
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Lint and format code and sort imports
          # ruff check . : check linting and imports sorting without fixing (to fix, use --fix)
          # ruff format --check . : check code formatting without fixing (to fix, remove --check)
          command: |
            uv run ruff check .
            uv run ruff format --check .

  tests:
    docker:
      - image: ghcr.io/astral-sh/uv:python<< pipeline.parameters.python-version >>-bookworm-slim
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run tests
          command: |
            uv run pytest -s tests/ --junitxml=reports/python/tests.xml -p no:sugar --color=yes
      - store_test_results:
          path: reports/python

  build:
    docker:
      - image: ghcr.io/astral-sh/uv:python<< pipeline.parameters.python-version >>-bookworm-slim
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Set the version
          command: |
            if [[ $CIRCLE_TAG ]]; then
                # This is a tagged release, version should be handled upstream
                uv version $CIRCLE_TAG
            else
                # For non-tagged releases, use the update_version.py script
                uv run python update_version.py
            fi
      - run:
          name: Build a distributable package
          command: |
            # Build a wheel release
            uv build
      - store_artifacts:
          path: dist
      - persist_to_workspace:
          root: .
          paths:
            - .

  publish:
    docker:
      - image: ghcr.io/astral-sh/uv:python<< pipeline.parameters.python-version >>-bookworm-slim
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Publish on PyPI
          command: uv publish --username "${PYPI_USERNAME}" --password "${PYPI_PASSWORD}" dist/*

workflows:
  build:
    jobs:
      - install:
          filters:
            tags:
              only: /v[0-9]+(\.[0-9]+)*/
      - lint:
          requires:
            - install
          filters:
            tags:
              only: /v[0-9]+(\.[0-9]+)*/
      - tests:
          requires:
            - install
          filters:
            tags:
              only: /v[0-9]+(\.[0-9]+)*/
      - build:
          requires:
            - tests
            - lint
          filters:
            tags:
              only: /v[0-9]+(\.[0-9]+)*/
      - publish:
          requires:
            - build
          filters:
            branches:
              only:
                - << pipeline.parameters.publish-branch >>
                - /[0-9]+(\.[0-9]+)+/
                - /rc[0-9]+/
            tags:
              only: /v[0-9]+(\.[0-9]+)*/
          context: org-global
